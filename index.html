let DB = null;
let CFG = {};
let PRECIOS = {};
let PAGINA = 'home'; // home | archivo | compra | admin-login | admin
let SESSION = null;

// Estado de compra
let COMPRA = {
  paso: 1,
  tamanio: null,
  tipo: null,
  cuadro: null,
  pago: null,
};

// Archivo
let CUADROS_TODOS = [];
let FILTRO_TEC = 'todos';
let SOLO_STOCK = false;

// Admin
let ADM_SEC = 'kpis';

// ============================================================
// INIT
// ============================================================
function init() {
  // Inyectar CSS
  const style = document.createElement('style');
  style.textContent = CSS;
  document.head.appendChild(style);

  // Conectar Supabase
  DB = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  // EmailJS
  emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);

  // Manejar hash
  window.addEventListener('hashchange', router);
  router();
}

function router() {
  const hash = location.hash || '#home';
  if (hash === '#archivo') render('archivo');
  else if (hash === '#compra') render('compra');
  else if (hash === '#admin-login') render('admin-login');
  else if (hash === '#admin') render('admin');
  else render('home');
}

function ir(pagina) {
  location.hash = '#' + pagina;
}

// ============================================================
// RENDER PRINCIPAL
// ============================================================
async function render(pag) {
  PAGINA = pag;
  const app = document.getElementById('app');

  // Cargar config y precios si no están
  if (!CFG.email_vendedor) await cargarConfig();

  if (pag === 'home') app.innerHTML = htmlHome();
  else if (pag === 'archivo') { app.innerHTML = htmlArchivo(); cargarCuadros(); }
  else if (pag === 'compra') { app.innerHTML = htmlCompra(); initCompra(); }
  else if (pag === 'admin-login') app.innerHTML = htmlAdminLogin();
  else if (pag === 'admin') {
    const { data: { session } } = await DB.auth.getSession();
    if (!session) { ir('admin-login'); return; }
    SESSION = session;
    app.innerHTML = htmlAdmin();
    cargarSecAdmin('kpis');
  }

  // Post-render
  if (pag === 'home') {
    await cargarHome();
    initNavScroll();
  }
  window.scrollTo(0, 0);
}

// ============================================================
// CONFIG
// ============================================================
async function cargarConfig() {
  const [{ data: cfg }, { data: pre }] = await Promise.all([
    DB.from('configuracion').select('*'),
    DB.from('precios').select('*'),
  ]);
  if (cfg) cfg.forEach(r => CFG[r.clave] = r.valor);
  if (pre) pre.forEach(r => PRECIOS[r.tamanio] = r.precio);
}

async function cargarHome() {
  // Galería preview
  const { data: cuadros } = await DB.from('cuadros').select('*').eq('activo', true).limit(6);
  const galEl = document.getElementById('gal-home');
  if (galEl) {
    if (!cuadros || cuadros.length === 0) {
      galEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--suave)">Próximamente nuestras obras</p>';
    } else {
      galEl.innerHTML = cuadros.map(c => `
        <div class="gal-item" onclick="ir('archivo')">
          ${c.imagen_url ? `<img src="${c.imagen_url}" alt="${c.nombre}" loading="lazy"/>` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.2">✝</div>`}
          <div class="gal-ov"><span>${c.nombre}</span></div>
        </div>`).join('');
    }
  }

  // Precios
  const precEl = document.getElementById('precios-grid');
  if (precEl) {
    const ics = { '15x15': '🖼️', '20x20': '🎨', 'personalizado': '✨' };
    const { data: precios } = await DB.from('precios').select('*').order('precio');
    if (precios && precios.length) {
      precEl.innerHTML = precios.map(p => `
        <div class="p-card ${p.tamanio === '20x20' ? 'dest' : ''}">
          ${p.tamanio === '20x20' ? '<span class="p-badge">Popular</span>' : ''}
          <div class="p-tam">${ics[p.tamanio] || '🖼️'} ${p.tamanio}</div>
          <div class="p-val">${p.precio > 0 ? `<span>$</span>${Number(p.precio).toLocaleString('es-AR')}` : 'A consultar'}</div>
          <p class="p-desc">${p.descripcion || ''}</p>
          <button class="btn ${p.tamanio === '20x20' ? 'btn-g' : 'btn-o'}" style="width:100%;justify-content:center" onclick="ir('compra')">Comprar</button>
        </div>`).join('');
    }
  }

  // Lugares
  const lugEl = document.getElementById('lugares-grid');
  if (lugEl) {
    const { data: cons } = await DB.from('consignaciones').select('*').eq('activo', true);
    if (!cons || cons.length === 0) {
      lugEl.innerHTML = '<p style="text-align:center;color:var(--suave)">Próximamente en locales físicos.</p>';
    } else {
      const uniq = [...new Map(cons.map(d => [d.nombre_lugar, d])).values()];
      lugEl.innerHTML = uniq.map(l => `
        <div class="l-card">
          <div style="font-size:2rem">🏪</div>
          <div class="l-info"><h4>${l.nombre_lugar}</h4><p>${l.direccion || ''}</p>${l.telefono ? `<p style="margin-top:4px">📞 ${l.telefono}</p>` : ''}</div>
          ${l.google_maps_url ? `<a href="${l.google_maps_url}" target="_blank" class="l-link">📍 Ver en el mapa →</a>` : ''}
        </div>`).join('');
    }
  }
}

      </div>

function setFiltro(btn, tec) {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  FILTRO_TEC = tec;
  renderCuadros();
}

function toggleStock() {
  SOLO_STOCK = !SOLO_STOCK;
  document.getElementById('tog-stock').classList.toggle('on', SOLO_STOCK);
  renderCuadros();
}

async function cargarCuadros() {
  const { data } = await DB.from('cuadros').select(`*, consignaciones(*)`).eq('activo', true).order('fecha_creacion', { ascending: false });
  CUADROS_TODOS = data || [];
  renderCuadros();
}

function renderCuadros() {
  let lista = CUADROS_TODOS;
  if (FILTRO_TEC !== 'todos') lista = lista.filter(c => c.tecnica === FILTRO_TEC);
  if (SOLO_STOCK) lista = lista.filter(c => c.estado === 'stock' && c.cantidad_disponible > 0);

  const grid = document.getElementById('cuadros-grid');
  if (!grid) return;

  if (lista.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px"><p style="font-family:var(--display);font-size:1.6rem;font-style:italic;color:var(--suave)">No hay cuadros con ese filtro</p><button class="btn btn-p" style="margin-top:24px" onclick="ir('compra')">Encargar personalizado</button></div>`;
    return;
  }

  const badges = { stock: 'b-stock', consignacion: 'b-cons', agotado: 'b-ago', vendido: 'b-ago' };
  const labels = { stock: 'En stock', consignacion: 'Consignación', agotado: 'Agotado', vendido: 'Vendido' };

  grid.innerHTML = lista.map(c => {
    let accion = '';
    if (c.estado === 'stock' && c.cantidad_disponible > 0)
      accion = `<button class="btn btn-p" onclick="irACompra('${c.id}')">Comprar este cuadro</button>`;
    else if (c.estado === 'consignacion')
      accion = `<button class="btn btn-g" onclick="mostrarConsig('${c.id}')">¿Dónde conseguirlo?</button>`;
    else
      accion = `<button class="btn btn-o" onclick="irAPersonalizado('${c.id}')">Encargar versión similar</button>`;

    return `
    <div class="c-card">
      <div class="c-img">
        ${c.imagen_url ? `<img src="${c.imagen_url}" alt="${c.nombre}" loading="lazy"/>` : `<div class="c-ph">✝</div>`}
        <span class="c-badge ${badges[c.estado] || 'b-ago'}">${labels[c.estado] || c.estado}</span>
      </div>
      <div class="c-info">
        <span class="c-cod">${c.codigo_id}</span>
        <div class="c-nom">${c.nombre}</div>
        <p class="c-tec">${c.tecnica ? c.tecnica.charAt(0).toUpperCase()+c.tecnica.slice(1) : '—'} · ${c.tamanio || '—'}</p>
        ${c.descripcion ? `<p style="font-size:.85rem;margin-top:6px">${c.descripcion}</p>` : ''}
        ${c.estado === 'stock' ? `<p style="font-size:.82rem;margin-top:4px">Disponibles: ${c.cantidad_disponible}</p>` : ''}
        ${c.precio ? `<p style="font-family:var(--display);font-size:1.3rem;color:var(--oro-osc);margin-top:8px">$${Number(c.precio).toLocaleString('es-AR')}</p>` : ''}
      </div>
      <div class="c-acc">${accion}</div>
    </div>`;
  }).join('');
}

function irACompra(id) {
  COMPRA = { paso: 1, tamanio: null, tipo: 'stock', cuadro: CUADROS_TODOS.find(c => c.id === id) || null, pago: null };
  ir('compra');
}

function irAPersonalizado(id) {
  COMPRA = { paso: 1, tamanio: 'personalizado', tipo: 'personalizado_archivo', cuadro: CUADROS_TODOS.find(c => c.id === id) || null, pago: null };
  ir('compra');
}

function mostrarConsig(id) {
  const c = CUADROS_TODOS.find(x => x.id === id);
  if (!c) return;
  document.getElementById('modal-cons').classList.add('on');
  document.getElementById('btn-comp-pers').onclick = () => { cerrarModal('modal-cons'); irAPersonalizado(id); };
  document.getElementById('btn-ir-sant').onclick = () => {
    cerrarModal('modal-cons');
    if (c.consignaciones?.length) {
      const s = c.consignaciones[0];
      document.getElementById('sant-nom').textContent = s.nombre_lugar;
      document.getElementById('sant-dir').textContent = s.direccion || '';
      document.getElementById('sant-tel').textContent = s.telefono ? '📞 '+s.telefono : '';
      document.getElementById('sant-maps').href = s.google_maps_url || '#';
      document.getElementById('modal-sant').classList.add('on');
    }
  };
}

function cerrarModal(id) { document.getElementById(id)?.classList.remove('on'); }

function htmlCompra() {
  return `
  ${htmlNav()}
  <div class="page-hdr"><div class="wrap"><span class="tag">Adquirí tu obra</span><h1>Comprar cuadro</h1></div></div>
  <div style="background:var(--marfil);padding:60px 0;min-height:60vh">
    <div class="wrap">
      <div class="stepper">
        <div class="step on" id="stp-1"><div class="step-n">1</div><div class="step-l">Tipo</div></div>
        <div class="step" id="stp-2"><div class="step-n">2</div><div class="step-l">Cuadro</div></div>
        <div class="step" id="stp-3"><div class="step-n">3</div><div class="step-l">Datos</div></div>
        <div class="step" id="stp-4"><div class="step-n">4</div><div class="step-l">Pago</div></div>
      </div>
      <div class="compra-panel" id="compra-panel"></div>
    </div>
  </div>
  ${htmlFooter()}`;
}

async function initCompra() {
  // Si viene con cuadro preseleccionado
  if (COMPRA.cuadro && COMPRA.tipo === 'stock') {
    COMPRA.tamanio = COMPRA.cuadro.tamanio;
    renderPasoCompra(3);
  } else if (COMPRA.cuadro && COMPRA.tipo === 'personalizado_archivo') {
    renderPasoCompra(3);
  } else {
    renderPasoCompra(1);
  }
}

function renderPasoCompra(paso) {
  COMPRA.paso = paso;
  // Stepper
  [1,2,3,4].forEach(i => {
    const el = document.getElementById(`stp-${i}`);
    if (!el) return;
    el.classList.remove('on','done');
    if (i < paso) el.classList.add('done');
    if (i === paso) el.classList.add('on');
  });

  const panel = document.getElementById('compra-panel');
  if (!panel) return;

  if (paso === 1) panel.innerHTML = htmlPaso1();
  else if (paso === 2) panel.innerHTML = htmlPaso2();
  else if (paso === 3) panel.innerHTML = htmlPaso3();
  else if (paso === 4) { panel.innerHTML = htmlPaso4(); actualizarResumen(); }
  else if (paso === 99) panel.innerHTML = htmlExito();
  else if (paso === 98) panel.innerHTML = htmlExitoPersonalizado();

  window.scrollTo({ top: 200, behavior: 'smooth' });
}

function htmlPaso1() {
  const ics = { '15x15': '🖼️', '20x20': '🎨', 'personalizado': '✨' };
  const descs = { '15x15': 'Ideal para regalos', '20x20': 'El más popular', 'personalizado': 'Tamaño a medida' };
  const tams = ['15x15', '20x20', 'personalizado'];
  return `
  <h3 style="font-family:var(--display);font-size:2rem;margin-bottom:8px">¿Qué tipo de cuadro querés?</h3>
  <p style="margin-bottom:32px">Elegí el tamaño o si querés un cuadro personalizado</p>
  <div class="tam-grid">
    ${tams.map(t => `
    <div class="tam-opt ${COMPRA.tamanio===t?'sel':''}" onclick="selTamanio('${t}')">
      <div class="tam-ic">${ics[t]}</div>
      <div class="tam-nom">${t === 'personalizado' ? 'Personalizado' : t+' cm'}</div>
      <div class="tam-pre">${PRECIOS[t] > 0 ? '$'+Number(PRECIOS[t]).toLocaleString('es-AR') : 'A consultar'}</div>
      <p style="font-size:.75rem;color:var(--suave);margin-top:4px">${descs[t]}</p>
    </div>`).join('')}
  </div>`;
}

function selTamanio(t) {
  COMPRA.tamanio = t;
  if (t === 'personalizado') {
    COMPRA.tipo = null;
    renderPasoCompra(2);
  } else {
    COMPRA.tipo = 'stock';
    cargarCuadrosStockYRender(t);
  }
}

async function cargarCuadrosStockYRender(tamanio) {
  const { data } = await DB.from('cuadros').select('*').eq('estado','stock').eq('activo',true).gt('cantidad_disponible',0);
  const filtrados = (data || []).filter(c => !c.tamanio || c.tamanio === tamanio);
  renderPasoCompra(2);
  // Rerender con cuadros
  const panel = document.getElementById('compra-panel');
  if (!panel) return;
  panel.innerHTML = `
  <h3 style="font-family:var(--display);font-size:2rem;margin-bottom:8px">Elegí tu cuadro</h3>
  <p style="margin-bottom:24px">Cuadros disponibles en ${tamanio}</p>
  <div id="stock-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px">
    ${filtrados.length === 0
      ? `<div style="grid-column:1/-1;text-align:center;padding:32px"><p style="color:var(--suave)">No hay cuadros en stock para este tamaño.</p><button class="btn btn-o" style="margin-top:16px" onclick="selTamanio('personalizado')">Ver opciones personalizadas</button></div>`
      : filtrados.map(c => `
        <div class="c-card" style="cursor:pointer" id="sc-${c.id}" onclick="selCuadroStock('${c.id}')">
          <div class="c-img" style="aspect-ratio:1">${c.imagen_url ? `<img src="${c.imagen_url}" alt="${c.nombre}" style="width:100%;height:100%;object-fit:cover"/>` : `<div class="c-ph" style="font-size:2rem">✝</div>`}</div>
          <div class="c-info" style="padding:12px">
            <span class="c-cod">${c.codigo_id}</span>
            <div class="c-nom" style="font-size:1.1rem">${c.nombre}</div>
            ${c.precio ? `<div style="color:var(--oro-osc);font-family:var(--display);font-size:1.1rem">$${Number(c.precio).toLocaleString('es-AR')}</div>` : ''}
          </div>
        </div>`).join('')
    }
  </div>
  <div style="display:flex;gap:12px">
    <button class="btn btn-gh" onclick="renderPasoCompra(1)">← Volver</button>
    <button class="btn btn-p" id="btn-sig-stock" onclick="renderPasoCompra(3)" ${COMPRA.cuadro?'':'disabled'}>Continuar →</button>
  </div>`;
}

function selCuadroStock(id) {
  const { data: _ } = {};
  const c = CUADROS_TODOS.find(x => x.id === id) || { id };
  COMPRA.cuadro = c;
  document.querySelectorAll('#stock-grid .c-card').forEach(el => el.style.borderColor = '');
  const el = document.getElementById(`sc-${id}`);
  if (el) el.style.borderColor = 'var(--oro)';
  const btn = document.getElementById('btn-sig-stock');
  if (btn) btn.disabled = false;
}

function htmlPaso2() {
  // Solo para personalizado
  return `
  <h3 style="font-family:var(--display);font-size:2rem;margin-bottom:8px">¿Qué tipo de personalizado?</h3>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;margin-top:24px">
    <div class="tam-opt" onclick="selTipoPerso('archivo')">
      <div class="tam-ic">🖼️</div>
      <div class="tam-nom" style="font-size:1rem">Del archivo</div>
      <p style="font-size:.8rem;color:var(--suave);margin-top:4px">Un cuadro que ya hicimos, reinterpretado (+10%)</p>
    </div>
    <div class="tam-opt" onclick="selTipoPerso('nuevo')">
      <div class="tam-ic">✨</div>
      <div class="tam-nom" style="font-size:1rem">Completamente nuevo</div>
      <p style="font-size:.8rem;color:var(--suave);margin-top:4px">Una idea única, nunca hecha antes</p>
    </div>
  </div>
  <button class="btn btn-gh" onclick="renderPasoCompra(1)">← Volver</button>`;
}

async function selTipoPerso(tipo) {
  if (tipo === 'nuevo') {
    COMPRA.tipo = 'personalizado_nuevo';
    COMPRA.cuadro = null;
    renderPasoCompra(3);
  } else {
    COMPRA.tipo = 'personalizado_archivo';
    // Mostrar archivo para elegir base
    await cargarArchivoYRender();
  }
}

async function cargarArchivoYRender() {
  const { data } = await DB.from('cuadros').select('*').eq('activo', true);
  const panel = document.getElementById('compra-panel');
  if (!panel) return;
  panel.innerHTML = `
  <h3 style="font-family:var(--display);font-size:2rem;margin-bottom:8px">Elegí el cuadro base</h3>
  <p style="margin-bottom:24px;color:var(--suave)">Seleccioná el cuadro que queremos recrear para vos (+10%)</p>
  <div id="arch-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px">
    ${(data || []).map(c => `
    <div class="c-card" style="cursor:pointer" id="ac-${c.id}" onclick="selCuadroArchivo('${c.id}')">
      <div class="c-img" style="aspect-ratio:1">${c.imagen_url ? `<img src="${c.imagen_url}" alt="${c.nombre}" style="width:100%;height:100%;object-fit:cover"/>` : `<div class="c-ph" style="font-size:2rem">✝</div>`}</div>
      <div class="c-info" style="padding:12px"><span class="c-cod">${c.codigo_id}</span><div class="c-nom" style="font-size:1.1rem">${c.nombre}</div></div>
    </div>`).join('')}
  </div>
  <div style="display:flex;gap:12px">
    <button class="btn btn-gh" onclick="renderPasoCompra(2)">← Volver</button>

  </div>`;
  // Preseleccionar si viene del archivo
  if (COMPRA.cuadro) {
    const el = document.getElementById(`ac-${COMPRA.cuadro.id}`);
    if (el) el.style.borderColor = 'var(--oro)';
    const btn = document.getElementById('btn-sig-arch');
    if (btn) btn.disabled = false;
  }
}

function selCuadroArchivo(id) {
  COMPRA.cuadro = CUADROS_TODOS.find(x => x.id === id) || { id };
  document.querySelectorAll('#arch-grid .c-card').forEach(el => el.style.borderColor = '');
  const el = document.getElementById(`ac-${id}`);
  if (el) el.style.borderColor = 'var(--oro)';
  const btn = document.getElementById('btn-sig-arch');
  if (btn) btn.disabled = false;
}

function htmlPaso3() {
  const esNuevo = COMPRA.tipo === 'personalizado_nuevo';
  return `
  <h3 style="font-family:var(--display);font-size:2rem;margin-bottom:8px">Tus datos</h3>
  <p style="margin-bottom:32px">Necesitamos esta información para coordinar la entrega</p>
  <div class="fg"><label class="fl">Nombre completo *</label><input class="fi" id="c-nom" type="text" placeholder="Tu nombre y apellido" value="${COMPRA._nombre||''}"/></div>
  <div class="fg"><label class="fl">Email *</label><input class="fi" id="c-email" type="email" placeholder="tu@email.com" value="${COMPRA._email||''}"/></div>
  <div class="fg"><label class="fl">Teléfono / WhatsApp</label><input class="fi" id="c-tel" type="tel" placeholder="+54 9 11 1234-5678" value="${COMPRA._tel||''}"/></div>
  <div class="fg"><label class="fl">Zona de entrega *</label><input class="fi" id="c-zona" type="text" placeholder="Ej: Palermo, CABA" value="${COMPRA._zona||''}"/>
  <p style="font-size:.8rem;color:var(--suave);margin-top:6px">⚠️ No realizamos envíos a domicilio. La entrega se coordina personalmente.</p></div>
  ${esNuevo ? `
  <div class="fg"><label class="fl">Tamaño deseado</label>
  <select class="fs" id="c-tam-p"><option value="">Seleccioná un tamaño</option><option value="15x15">15x15 cm</option><option value="20x20">20x20 cm</option><option value="otro">Otro (especificar en descripción)</option></select></div>
  <div class="fg"><label class="fl">Descripción del cuadro *</label><textarea class="ft" id="c-desc" placeholder="Contanos qué querés: imagen, colores, técnica preferida, destino...">${COMPRA._desc||''}</textarea></div>
  <div class="fg"><label class="fl">Imagen de referencia</label>
  <input class="fi" type="file" id="c-imgref-file" accept="image/*" style="padding:10px"/>
  <input type="hidden" id="c-imgref" value="${COMPRA._imgref||''}"/>
  <p style="font-size:.8rem;color:var(--suave);margin-top:6px">Si no tenés imagen ahora, podés enviarla por WhatsApp luego.</p>
</div>
  ` : ''}
  <div style="display:flex;gap:12px">
    <button class="btn btn-gh" onclick="volverDePaso3()">← Volver</button>
    <button class="btn btn-p" onclick="avanzarDePaso3()">Continuar →</button>
  </div>`;
}

function volverDePaso3() {
  if (COMPRA.tipo === 'personalizado_nuevo' || COMPRA.tipo === 'personalizado_archivo') renderPasoCompra(2);
  else renderPasoCompra(2);
}

async function avanzarDePaso3() {
  const nom = document.getElementById('c-nom')?.value.trim();
  const email = document.getElementById('c-email')?.value.trim();
  const zona = document.getElementById('c-zona')?.value.trim();
  if (!nom || !email || !zona) { alert('Por favor completá los campos obligatorios.'); return; }
  if (COMPRA.tipo === 'personalizado_nuevo') {
    const desc = document.getElementById('c-desc')?.value.trim();
    if (!desc) { alert('Por favor describí el cuadro que querés.'); return; }
    COMPRA._desc = desc;

    // Subir imagen de referencia si se eligió una
    const fileInput = document.getElementById('c-imgref-file');
    if (fileInput?.files?.length > 0) {
      const file = fileInput.files[0];
      const ext = file.name.split('.').pop();
      const fileName = `ref-${Date.now()}.${ext}`;
      const { error: uploadErr } = await DB.storage
        .from('cuadros')
        .upload(fileName, file, { upsert: true });
      if (uploadErr) {
        alert('Error al subir la imagen. Podés continuar sin ella y enviarla por WhatsApp.');
      } else {
        const { data: urlData } = DB.storage.from('cuadros').getPublicUrl(fileName);
        COMPRA._imgref = urlData.publicUrl;
      }
    } else {
      COMPRA._imgref = '';
    }
  }
  COMPRA._nombre = nom; COMPRA._email = email;
  COMPRA._tel = document.getElementById('c-tel')?.value;
  COMPRA._zona = zona;
  renderPasoCompra(4);
}

function htmlPaso4() {
  return `
  <h3 style="font-family:var(--display);font-size:2rem;margin-bottom:8px">Forma de pago</h3>
  <p style="margin-bottom:24px">Elegí cómo querés abonar</p>
  <div class="pago-opts">
    <div class="pago-opt" id="pag-ef" onclick="selPago('efectivo')"><div class="pago-ic">💵</div><div class="pago-nom">Efectivo</div><p style="font-size:.8rem;color:var(--suave);margin-top:4px">Al momento de la entrega</p></div>
    <div class="pago-opt" id="pag-mp" onclick="selPago('mercadopago')"><div class="pago-ic">💳</div><div class="pago-nom">MercadoPago</div><p style="font-size:.8rem;color:var(--suave);margin-top:4px">Transferencia o tarjeta</p></div>
  </div>
  <div class="resumen" id="resumen"></div>
  <p id="pago-msg" style="font-size:.88rem;color:var(--suave);margin-bottom:16px"></p>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <button class="btn btn-gh" onclick="renderPasoCompra(3)">← Volver</button>
    <button class="btn btn-g" id="btn-conf" onclick="confirmarPedido()" disabled>✓ Confirmar pedido</button>
  </div>`;
}

function selPago(met) {
  COMPRA.pago = met;
  document.querySelectorAll('.pago-opt').forEach(o => o.classList.remove('sel'));
  document.getElementById(`pag-${met === 'efectivo' ? 'ef' : 'mp'}`).classList.add('sel');
  document.getElementById('btn-conf').disabled = false;
  document.getElementById('pago-msg').textContent = met === 'efectivo'
    ? '💵 Abonás al momento de la entrega. Te contactaremos para coordinar.'
    : '💳 Al confirmar, te enviaremos el link de pago por MercadoPago.';
}

function actualizarResumen() {
  let precio = 0;
  let cuadroNom = '—';
  if (COMPRA.cuadro) {
    cuadroNom = COMPRA.cuadro.nombre || '—';
    precio = COMPRA.cuadro.precio || PRECIOS[COMPRA.tamanio] || 0;
  } else if (COMPRA.tipo === 'personalizado_nuevo') {
    cuadroNom = 'Cuadro personalizado nuevo';
  }
  if (COMPRA.tipo === 'personalizado_archivo' && precio) {
    precio = precio * (1 + Number(CFG.recargo_personalizado_archivo || 10) / 100);
  }
  COMPRA._precio = precio;
  const el = document.getElementById('resumen');
  if (!el) return;
  el.innerHTML = `
  <h4 style="margin-bottom:16px;font-family:var(--display)">Resumen del pedido</h4>
  <div class="res-item"><span>Cuadro</span><span>${cuadroNom}</span></div>
  <div class="res-item"><span>Tamaño</span><span>${COMPRA.tamanio || '—'}</span></div>

async function confirmarPedido() {
  const btn = document.getElementById('btn-conf');
  btn.disabled = true; btn.textContent = 'Procesando...';

  const datos = {
    numero_pedido: 'PED-' + Date.now(),
    tipo: COMPRA.tipo,
    cuadro_id: COMPRA.cuadro?.id || null,
    cliente_nombre: COMPRA._nombre,
    cliente_email: COMPRA._email,
    cliente_telefono: COMPRA._tel || null,
    zona_envio: COMPRA._zona,
    metodo_pago: COMPRA.pago,
    tamanio: COMPRA.tamanio,
    canal: 'web',
    precio_total: COMPRA._precio || null,
    descripcion_personalizado: COMPRA._desc || null,
    imagen_referencia_url: COMPRA._imgref || null,
  };

  const { error } = await DB.from('pedidos').insert(datos);
  if (error) {
    alert('Error al procesar el pedido. Por favor intentá de nuevo o contactanos directamente.');
    btn.disabled = false; btn.textContent = '✓ Confirmar pedido';
    return;
  }

  // Emails
  try {
    const ep = { cliente_nombre: datos.cliente_nombre, numero_pedido: datos.numero_pedido,
      cuadro: COMPRA.cuadro?.nombre || 'Personalizado', tamanio: datos.tamanio,
      precio: COMPRA._precio > 0 ? '$'+Number(COMPRA._precio).toLocaleString('es-AR') : 'A consultar',
      zona: datos.zona_envio, metodo_pago: datos.metodo_pago === 'efectivo' ? 'Efectivo' : 'MercadoPago',
      vendedor_email: CFG.email_vendedor, to_email: datos.cliente_email };
    if (COMPRA.tipo === 'personalizado_nuevo') {
      await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_PERSONALIZADO,
        { ...ep, to_email: CFG.email_vendedor, descripcion: datos.descripcion_personalizado, imagen_ref: datos.imagen_referencia_url || 'Sin imagen' });
    } else {
      await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_CLIENTE, ep);
      await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_VENDEDOR, { ...ep, to_email: CFG.email_vendedor });
    }
  } catch(e) { console.warn('Email error:', e); }

  COMPRA._numpedido = datos.numero_pedido;
  if (COMPRA.tipo === 'personalizado_nuevo') renderPasoCompra(98);
  else renderPasoCompra(99);
}

// ---- KPIs ----
async function renderKPIs(main) {
  const [{ data: todos }, { data: pagados }] = await Promise.all([
    DB.from('pedidos').select('*').order('created_at', { ascending: false }),
    DB.from('pedidos').select('*').eq('estado_pago','pagado'),
  ]);
  const allP = todos || []; const pagP = pagados || [];

  const total = pagP.reduce((s,p) => s+(p.precio_total||0),0);
  const directa = pagP.filter(p=>p.canal!=='consignacion').reduce((s,p)=>s+(p.precio_total||0),0);
  const cons = pagP.filter(p=>p.canal==='consignacion').reduce((s,p)=>s+(p.precio_total||0),0);

  // Por mes (últimos 6)
  const porMes = {};
  pagP.forEach(p => { const m=p.created_at.slice(0,7); porMes[m]=(porMes[m]||0)+(p.precio_total||0); });
  const meses = Object.keys(porMes).sort().slice(-6);
  const maxV = Math.max(...meses.map(m=>porMes[m]),1);

  // Por canal
  const canales = [
    { key:'web', label:'Web / Online' },
    { key:'consignacion', label:'Consignación' },
    { key:'particular', label:'Particular' },
  ];

  main.innerHTML = `
  <div class="adm-hdr"><h1>KPIs de ventas</h1><p style="color:var(--suave)">Resumen de ventas y rendimiento</p></div>
  <div class="stats-grid">
    <div class="stat"><div class="stat-v">$${Number(total).toLocaleString('es-AR')}</div><div class="stat-l">Total cobrado</div></div>
    <div class="stat"><div class="stat-v">${allP.length}</div><div class="stat-l">Pedidos totales</div></div>
    <div class="stat"><div class="stat-v">$${Number(directa).toLocaleString('es-AR')}</div><div class="stat-l">Venta directa</div></div>
    <div class="stat"><div class="stat-v">$${Number(cons).toLocaleString('es-AR')}</div><div class="stat-l">Consignación</div></div>
  </div>
  <div class="chart-wrap">
    <div class="chart-tit">Ventas por mes ($)</div>
    <div class="bar-chart">
      ${meses.length === 0 ? '<p style="text-align:center;color:var(--suave);align-self:center;width:100%">Sin datos aún</p>' :
        meses.map(m => {
          const [y,mo] = m.split('-');
          const lbl = new Date(y,mo-1).toLocaleDateString('es-AR',{month:'short'});
          const pct = (porMes[m]/maxV)*100;
          return `<div class="bar-it"><div class="bar-v">$${Math.round(porMes[m]/1000)}k</div><div class="bar-f" style="height:${Math.max(pct,4)}%"></div><div class="bar-lb">${lbl}</div></div>`;
        }).join('')}
    </div>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><h3 style="font-family:var(--display);font-size:1.2rem">Ventas por canal</h3></div>
    <table><thead><tr><th>Canal</th><th>Cantidad</th><th>Total $</th><th>Promedio $</th></tr></thead><tbody>
    ${canales.map(c => {
      const ps = pagP.filter(p=>p.canal===c.key);
      const t = ps.reduce((s,p)=>s+(p.precio_total||0),0);
      return `<tr><td>${c.label}</td><td>${ps.length}</td><td>$${Number(t).toLocaleString('es-AR')}</td><td>$${ps.length?Number(t/ps.length).toLocaleString('es-AR'):'—'}</td></tr>`;
    }).join('')}
    </tbody></table>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><h3 style="font-family:var(--display);font-size:1.2rem">Pedidos recientes</h3></div>
    <table><thead><tr><th>N° Pedido</th><th>Cliente</th><th>Tipo</th><th>Total</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>
    ${allP.slice(0,20).map(p => `<tr>
      <td style="font-family:var(--display)">${p.numero_pedido}</td>
      <td>${p.cliente_nombre}</td>
      <td style="font-size:.82rem">${{stock:'Stock',personalizado_archivo:'Pers. archivo',personalizado_nuevo:'Pers. nuevo'}[p.tipo]||p.tipo}</td>
      <td>${p.precio_total?'$'+Number(p.precio_total).toLocaleString('es-AR'):'A consultar'}</td>
      <td><span class="badge ${{pagado:'b-pag',pendiente:'b-pen',cancelado:'b-can'}[p.estado_pago]||'b-pen'}">${p.estado_pago||'pendiente'}</span></td>
      <td style="font-size:.82rem">${new Date(p.created_at).toLocaleDateString('es-AR')}</td>
    </tr>`).join('')}
    </tbody></table>
  </div>`;
}

async function guardarCuadro(id) {
  // Subir imagen si se seleccionó una
  const fileInput = document.getElementById('cf-img-file');
  if (fileInput?.files?.length > 0) {
    const file = fileInput.files[0];
    const ext = file.name.split('.').pop();
    const fileName = `cuadro-${Date.now()}.${ext}`;
    const { data: upload, error: uploadErr } = await DB.storage
      .from('cuadros')
      .upload(fileName, file, { upsert: true });
    if (uploadErr) { alert('Error al subir imagen: ' + uploadErr.message); return; }
    const { data: urlData } = DB.storage.from('cuadros').getPublicUrl(fileName);
    document.getElementById('cf-img').value = urlData.publicUrl;
  }

  const datos = {
    nombre: document.getElementById('cf-nom').value,
    codigo_id: document.getElementById('cf-cod').value,
    tecnica: document.getElementById('cf-tec').value || null,
    tamanio: document.getElementById('cf-tam').value || null,
    estado: document.getElementById('cf-est').value,
    cantidad_disponible: Number(document.getElementById('cf-cant').value),
    precio: document.getElementById('cf-pre').value ? Number(document.getElementById('cf-pre').value) : null,
    imagen_url: document.getElementById('cf-img').value || null,
    descripcion: document.getElementById('cf-desc').value || null,
  };
  let err;
  if (id) ({ error: err } = await DB.from('cuadros').update(datos).eq('id', id));
  else ({ error: err } = await DB.from('cuadros').insert(datos));
  if (err) { alert('Error: ' + err.message); return; }
  document.getElementById('form-cuadro-inline').style.display = 'none';
  renderAdmCuadros(document.getElementById('adm-main'));
}

async function eliminarCuadro(id, nombre) {

  await DB.from('cuadros').update({ activo: false }).eq('id', id);
  renderAdmCuadros(document.getElementById('adm-main'));
}

  const { data } = await DB.from('precios').select('*');
  main.innerHTML = `
  <div class="adm-hdr"><h1>Precios</h1><p style="color:var(--suave)">Actualizá los precios de los cuadros</p></div>
  <div style="max-width:500px">
    ${(data||[]).map(p=>`
    <div class="stat" style="margin-bottom:16px;text-align:left">
      <div class="stat-l">${p.tamanio}</div>
      <div style="display:flex;align-items:center;gap:16px;margin-top:8px;flex-wrap:wrap">
        <div class="stat-v" style="font-size:1.6rem">$${Number(p.precio).toLocaleString('es-AR')}</div>
        <input type="number" class="fi" id="pre-${p.tamanio}" value="${p.precio}" style="width:140px"/>
        <button class="btn btn-g" style="padding:10px 16px" onclick="guardarPrecio('${p.tamanio}')">Guardar</button>
      </div>
    </div>`).join('')}
  </div>`;
}

async function guardarPrecio(tam) {
  const val = document.getElementById(`pre-${tam}`)?.value;
  const { error } = await DB.from('precios').update({ precio: Number(val), updated_at: new Date() }).eq('tamanio', tam);
  if (error) alert('Error al guardar');
  else { alert('Precio actualizado ✓'); renderAdmPrecios(document.getElementById('adm-main')); }
}

// ---- LUGARES ----
async function renderAdmLugares(main) {
  const { data } = await DB.from('consignaciones').select('*');
  main.innerHTML = `
  <div class="adm-hdr" style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><h1>Lugares físicos</h1><p style="color:var(--suave)">Santerías y comercios de consignación</p></div>
    <button class="btn btn-g" onclick="abrirFormLugar(null)">+ Agregar lugar</button>
  </div>
  <div id="form-lugar-inline" style="display:none;margin-bottom:24px"></div>
  <div class="tbl-wrap"><table><thead><tr><th>Nombre</th><th>Dirección</th><th>Teléfono</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>
  ${(data||[]).map(l=>`<tr>
    <td>${l.nombre_lugar}</td>
    <td style="font-size:.85rem">${l.direccion||'—'}</td>
    <td>${l.telefono||'—'}</td>
    <td>${l.activo?'✅ Activo':'❌ Inactivo'}</td>
    <td>
      <button class="btn btn-gh" style="padding:6px 12px;font-size:.72rem" onclick="abrirFormLugar(${JSON.stringify(l).replace(/"/g,'&quot;')})">Editar</button>
      <button class="btn btn-gh" style="padding:6px 12px;font-size:.72rem;margin-left:4px" onclick="toggleLugar('${l.id}',${l.activo})">${l.activo?'Desactivar':'Activar'}</button>
    </td>
  </tr>`).join('')}
  </tbody></table></div>`;
}

function abrirFormLugar(l) {
  const el = document.getElementById('form-lugar-inline');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML = `
  <div style="background:var(--marfil);border:1px solid var(--lino-osc);border-radius:var(--rm);padding:32px">
    <h3 style="font-family:var(--display);font-size:1.6rem;margin-bottom:24px">${l?'Editar lugar':'Agregar lugar'}</h3>
    <div class="fg"><label class="fl">Nombre *</label><input class="fi" id="lf-nom" value="${l?.nombre_lugar||''}"/></div>
    <div class="fg"><label class="fl">Dirección</label><input class="fi" id="lf-dir" value="${l?.direccion||''}"/></div>
    <div class="fg"><label class="fl">Teléfono</label><input class="fi" id="lf-tel" value="${l?.telefono||''}"/></div>
    <div class="fg"><label class="fl">Link Google Maps</label><input class="fi" type="url" id="lf-maps" value="${l?.google_maps_url||''}" placeholder="https://maps.google.com/..."/></div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-p" onclick="guardarLugar('${l?.id||''}')">Guardar</button>
      <button class="btn btn-gh" onclick="document.getElementById('form-lugar-inline').style.display='none'">Cancelar</button>
    </div>
  </div>`;
  el.scrollIntoView({ behavior: 'smooth' });
}

async function guardarLugar(id) {
  const datos = { nombre_lugar: document.getElementById('lf-nom').value, direccion: document.getElementById('lf-dir').value, telefono: document.getElementById('lf-tel').value, google_maps_url: document.getElementById('lf-maps').value };
  let err;
  if (id) ({ error: err } = await DB.from('consignaciones').update(datos).eq('id', id));
  else ({ error: err } = await DB.from('consignaciones').insert(datos));
  if (err) { alert('Error: ' + err.message); return; }
  document.getElementById('form-lugar-inline').style.display = 'none';
  renderAdmLugares(document.getElementById('adm-main'));
}

async function toggleLugar(id, activo) {
  await DB.from('consignaciones').update({ activo: !activo }).eq('id', id);
  renderAdmLugares(document.getElementById('adm-main'));
}

// ---- CONFIGURACIÓN ----
async function renderAdmConfig(main) {
  const { data } = await DB.from('configuracion').select('*');
  const labels = { instagram_url:'URL de Instagram', whatsapp_numero:'Número de WhatsApp (sin +, con código de país)', email_vendedor:'Email del vendedor', descripcion_emprendimiento:'Descripción del emprendimiento', recargo_personalizado_archivo:'Recargo cuadros del archivo (%)' };
  main.innerHTML = `
  <div class="adm-hdr"><h1>Configuración general</h1><p style="color:var(--suave)">Textos, redes sociales y datos de contacto</p></div>
  <div style="max-width:600px">
    ${(data||[]).map(c=>`
    <div class="fg">
      <label class="fl">${labels[c.clave]||c.clave}</label>
      ${c.clave==='descripcion_emprendimiento'
        ? `<textarea class="ft" id="cfg-${c.clave}" style="min-height:100px">${c.valor||''}</textarea>`
        : `<input class="fi" id="cfg-${c.clave}" value="${c.valor||''}"/>`}
    </div>`).join('')}
    <button class="btn btn-g" onclick="guardarConfig(${JSON.stringify((data||[]).map(c=>c.clave))})">Guardar configuración</button>
  </div>`;
}

async function guardarConfig(claves) {
  for (const clave of claves) {
    const el = document.getElementById(`cfg-${clave}`);
    if (el) await DB.from('configuracion').update({ valor: el.value, updated_at: new Date() }).eq('clave', clave);
  }
  alert('Configuración guardada ✓');
  await cargarConfig();
}
